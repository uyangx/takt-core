name: Release
# Publishes to npm when a GitHub Release is published, using npm Trusted
# Publishing (OIDC). No NPM_TOKEN secret is needed: the runner authenticates
# to npm via its short-lived OIDC identity, and publishes with provenance.
on:
  release:
    types: [published]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: read
  id-token: write # required for npm OIDC Trusted Publishing
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # npm >= 11.5 is required for Trusted Publishing; the Node 20 bundled
      # npm is older, so upgrade it before publishing.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public
