name: Release
# Publishes to npm when a GitHub Release is published. The org restricts the
# Actions token to read-only, so we avoid any git writes from the runner:
# versioning is done via a PR, and publishing needs only NPM_TOKEN.
on:
  release:
    types: [published]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
